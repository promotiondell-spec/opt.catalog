<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Каталог — AT PARFUM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  color-scheme:light;
  --cream:#F7F4EF;--ink:#1C1A17;--ink2:#6B6760;--ink3:#A8A49E;
  --gold:#B8935A;--border:#E2DDD6;--card:#FFFFFF;
  --green:#1D9E75;--green-bg:#E1F5EE;
}
html,body{background:#1C1A17!important;color:#1C1A17!important}
body{font-family:"Helvetica Neue",Arial,sans-serif;min-height:100dvh;padding-bottom:80px}

/* HEADER */
.header{background:var(--ink);padding:14px 16px 12px;position:sticky;top:0;z-index:50}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand img{height:26px;width:auto;filter:brightness(0) invert(1)}
.brand-sub{font-size:11px;color:rgba(255,255,255,0.5);line-height:1.3;border-left:1px solid rgba(255,255,255,0.2);padding-left:10px}
.calc-btn{display:inline-flex;align-items:center;white-space:nowrap;padding:6px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.85);font-size:11px;text-decoration:none;transition:all .15s;line-height:1.3;text-align:center}
.calc-btn:hover{background:rgba(255,255,255,0.15);color:#fff}
@media(min-width:500px){.calc-btn{font-size:12px;padding:7px 12px}}
.cart-btn{display:flex;align-items:center;gap:6px;background:var(--gold);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation;flex-shrink:0}
.cart-badge{background:#fff;color:var(--ink);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.search-row{margin-bottom:10px}
.search-input{width:100%;padding:9px 14px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;background:rgba(255,255,255,0.08);color:#fff;font-size:14px;font-family:inherit;outline:none}
.search-input::placeholder{color:rgba(255,255,255,0.4)}
.search-input:focus{border-color:var(--gold)}
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-btn{white-space:nowrap;padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.65);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.filter-btn.active{background:var(--gold);border-color:var(--gold);color:#fff}

/* LIST HEADER */
.list-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 8px}
.count-label{font-size:13px;color:var(--ink2)}
.sort-select{font-size:13px;border:1px solid var(--border);border-radius:6px;padding:5px 10px;background:#fff;color:var(--ink);font-family:inherit;cursor:pointer;outline:none}

/* GRID — square cards */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 12px 20px}
@media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1200px){.grid{grid-template-columns:repeat(5,1fr)}}

/* CARD */
.card{background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .18s}
.card:active{transform:scale(.98)}

/* CARD SLIDER */
.card-slider{position:relative;width:100%;aspect-ratio:1/1;overflow:hidden;background:#f5f5f3}
.card-slides{display:flex;width:300%;height:100%;transition:transform .3s ease}
.card-slide{width:33.333%;height:100%;flex-shrink:0;position:relative}
.card-slide img{width:100%;height:100%;object-fit:cover}
.card-slide .bottle-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.card-arrow{position:absolute;top:50%;transform:translateY(-50%);width:26px;height:26px;background:rgba(255,255,255,0.85);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink);z-index:3;-webkit-tap-highlight-color:transparent;touch-action:manipulation;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
.card-arrow.prev{left:6px}
.card-arrow.next{right:6px}
.card-arrow.hidden{display:none}
.card-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:3}
.card-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.5);transition:background .2s}
.card-dot.active{background:#fff}
.card-badge{position:absolute;top:7px;left:7px;font-size:10px;font-weight:500;padding:3px 7px;border-radius:10px;letter-spacing:.03em;z-index:2}
.badge-new{background:var(--ink);color:#fff}
.badge-hit{background:var(--gold);color:#fff}
.badge-order{background:#6B6760;color:#fff}

/* CARD BODY */
.card-body{padding:10px 11px 12px}
.card-type{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:2px}
.card-name{font-size:14px;font-weight:500;line-height:1.2;margin-bottom:3px}
.card-sim{font-size:11px;color:var(--ink2);font-style:italic;margin-bottom:6px}
.card-notes{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px}
.note-tag{font-size:10px;padding:2px 6px;border-radius:8px;border:1px solid var(--border);color:var(--ink2)}
.card-vols{display:flex;gap:4px;margin-bottom:7px}
.vol-pill{flex:1;padding:4px 2px;font-size:11px;font-weight:500;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--ink2);cursor:pointer;text-align:center;transition:all .12s;font-family:inherit;touch-action:manipulation}
.vol-pill.active{border-color:var(--ink);background:var(--ink);color:#fff}
.card-bottom{display:flex;align-items:center;justify-content:space-between;gap:6px}
.card-price{font-size:14px;font-weight:500}
.card-retail{font-size:10px;color:var(--ink3);margin-top:1px}
.card-qty{display:flex;align-items:center;flex-shrink:0}
.card-qty-btn{width:28px;height:28px;border:1px solid var(--border);background:var(--cream);color:var(--ink);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent;line-height:1}
.card-qty-btn:first-child{border-radius:6px 0 0 6px}
.card-qty-btn:last-child{border-radius:0 6px 6px 0;background:var(--ink);color:#fff;border-color:var(--ink)}
.card-qty-btn.has-items{background:var(--green);border-color:var(--green);color:#fff}
.card-qty-val{width:26px;height:28px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;background:#fff}

/* DETAIL SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(2px);visibility:hidden}
.overlay.open{visibility:visible}
.overlay.open{opacity:1;pointer-events:all}
.sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:20px 20px 0 0;z-index:101;max-height:94dvh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);visibility:hidden}
.sheet.open{transform:translateY(0);visibility:visible}
/* Desktop: centered modal */
@media(min-width:700px){
  .sheet{
    left:50%;right:auto;bottom:auto;top:50%;
    transform:translate(-50%,-50%) scale(.96);
    width:560px;max-width:92vw;
    max-height:90dvh;
    border-radius:16px;
    overflow:hidden;overflow-y:auto;
    visibility:hidden;
  }
  .sheet.open{transform:translate(-50%,-50%) scale(1);visibility:visible}
  .sheet::-webkit-scrollbar{width:5px}
  .sheet::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .sheet-handle{display:none}
  .sheet-close{position:sticky;top:10px;display:flex;justify-content:flex-end;padding:0 14px;background:transparent;z-index:10;margin-bottom:-28px}
  .d-desktop{display:block}
  .d-desktop-left .d-gallery{border-radius:0;width:100%;aspect-ratio:1/1;height:auto}
  .d-desktop-left .d-gallery-slides{height:100%}
  .d-desktop-left .d-gallery-slide img{width:100%;height:100%;object-fit:cover}
  .d-desktop-right{display:block}
  .d-hero{padding:16px 20px}
  .d-section{padding:14px 20px}
  .d-add{padding:14px 20px 28px}
}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0}
.sheet-close{position:sticky;top:0;display:flex;justify-content:flex-end;padding:8px 14px 0;background:#fff;z-index:2}

.close-btn{background:#f5f5f3;border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:18px;color:var(--ink2);display:flex;align-items:center;justify-content:center;touch-action:manipulation}

/* DETAIL GALLERY */
.d-gallery{position:relative;width:100%;aspect-ratio:1/1;overflow:hidden;background:#f5f5f3;cursor:zoom-in}
.d-gallery-slides{display:flex;height:100%;transition:transform .3s ease}
.d-gallery-slide{width:100%;height:100%;flex-shrink:0}
.d-gallery-slide img{width:100%;height:100%;object-fit:cover}
.d-gallery-arrow{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;background:rgba(255,255,255,0.9);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--ink);z-index:3;box-shadow:0 2px 8px rgba(0,0,0,0.12);touch-action:manipulation}
.d-gallery-arrow.prev{left:10px}
.d-gallery-arrow.next{right:10px}
.d-gallery-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:3}
.d-gallery-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.5);transition:background .2s;cursor:pointer}
.d-gallery-dot.active{background:#fff}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox-inner{position:relative;width:100%;max-width:480px;max-height:80dvh;padding:0 40px}
@media(min-width:600px){.lightbox-inner{max-width:420px}}
.lightbox-slides{display:flex;transition:transform .3s ease;touch-action:pan-y}
.lightbox-slide{width:100%;flex-shrink:0}
.lightbox-slide img{width:100%;height:auto;max-height:60dvh;object-fit:contain;border-radius:4px}
@media(min-width:700px){.lightbox-inner{max-width:360px}.lightbox-slide img{max-height:55dvh}}
.lightbox-arrow{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;background:rgba(255,255,255,0.15);border:none;border-radius:50%;cursor:pointer;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.lightbox-arrow.prev{left:4px}
.lightbox-arrow.next{right:4px}
.lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox-dots{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.lightbox-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.4);cursor:pointer}
.lightbox-dot.active{background:#fff}

/* DETAIL content */
.d-hero{padding:14px 16px 16px;display:flex;gap:12px;align-items:flex-start}
.d-info{flex:1}
.d-type{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:3px}
.d-name{font-size:20px;font-weight:500;line-height:1.15;margin-bottom:4px}
.d-sim{font-size:12px;color:var(--ink2);font-style:italic;margin-bottom:7px}
.d-tags{display:flex;flex-wrap:wrap;gap:4px}
.d-tag{font-size:11px;padding:3px 8px;border-radius:10px;border:1px solid var(--border);color:var(--ink2)}
.d-tag.order{color:#7a5500;border-color:#f0d060;background:#fffbea}
.d-section{padding:14px 16px;border-top:1px solid var(--border)}
.d-section-title{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.d-desc{font-size:14px;color:var(--ink2);line-height:1.7}
.pyramid{display:flex;flex-direction:column;gap:6px}
.pyr-row{display:flex;align-items:center;gap:10px}
.pyr-lbl{width:58px;font-size:11px;color:var(--ink3);text-align:right;flex-shrink:0}
.pyr-bar{flex:1;border-radius:8px;padding:8px 10px;display:flex;flex-wrap:wrap;gap:5px}
.pyr-bar.top{background:#E8F5F3}.pyr-bar.heart{background:#F5EAF0}.pyr-bar.base{background:#F0EDE0}
.pnote{font-size:12px;font-weight:500}
.pnote.top{color:#2E7D72}.pnote.heart{color:#8B5A7E}.pnote.base{color:#6B5C3A}
.sim-row{display:flex;gap:12px;align-items:center}
.sim-img{width:60px;height:60px;border-radius:10px;background:#f5f5f3;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:var(--ink3);text-align:center;overflow:hidden}
.sim-img img{width:100%;height:100%;object-fit:cover}
.sim-name{font-size:16px;font-weight:500;margin-bottom:3px}
.sim-house{font-size:12px;color:var(--ink2)}
.d-vols{display:flex;gap:8px}
.d-vol{flex:1;border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s;touch-action:manipulation}
.d-vol.active{border-color:var(--ink);background:#f5f5f3}
.dv-ml{font-size:13px;font-weight:500;margin-bottom:3px}
.dv-buy{font-size:16px;font-weight:500}
.dv-ret{font-size:11px;color:var(--ink3);margin-top:2px}
.d-add{padding:14px 16px 28px;display:flex;gap:8px}
.qty-wrap{display:flex;align-items:center;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.qty-btn{width:40px;height:46px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink);touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.qty-val{width:38px;text-align:center;font-size:15px;font-weight:500}
.add-main{flex:1;height:46px;background:var(--ink);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s;touch-action:manipulation}
.add-main.done{background:var(--green)}

/* CART */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.cart-overlay.open{opacity:1;pointer-events:all}
.cart-drawer{position:fixed;right:0;top:0;bottom:0;width:320px;max-width:94vw;background:#fff;z-index:201;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.cart-drawer.open{transform:translateX(0)}
.cart-head{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cart-title{font-size:20px;font-weight:500}
.cart-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink2);line-height:1;touch-action:manipulation}
.cart-body{flex:1;overflow-y:auto;padding:12px 16px}
.cart-empty{text-align:center;padding:48px 0;color:var(--ink3);font-size:14px}
.ci{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);align-items:center}
.ci:last-child{border-bottom:none}
.ci-info{flex:1}
.ci-name{font-size:14px;font-weight:500;margin-bottom:3px}
.ci-sub{font-size:12px;color:var(--ink2)}
.ci-qty{display:flex;align-items:center}
.ci-qty-btn{width:28px;height:28px;border:1px solid var(--border);background:#f5f5f3;color:var(--ink);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;line-height:1}
.ci-qty-btn:first-child{border-radius:6px 0 0 6px}
.ci-qty-btn:last-child{border-radius:0 6px 6px 0}
.ci-qty-val{width:30px;height:28px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;background:#fff}
.ci-del{background:none;border:none;color:var(--ink3);font-size:18px;cursor:pointer;padding:0 4px;touch-action:manipulation}
.cart-foot{padding:14px 16px 24px;border-top:1px solid var(--border)}
.cart-total-row{display:flex;justify-content:space-between;font-size:15px;font-weight:500;margin-bottom:12px}
.send-tg{width:100%;padding:13px;background:var(--ink);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-bottom:8px;touch-action:manipulation}
.send-mail{width:100%;padding:13px;background:#f5f5f3;color:var(--ink);border:1px solid var(--border);border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;touch-action:manipulation}
.no-results{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--ink2);font-size:14px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="brand">
      <img src="logo.png" alt="AT PARFUM">
      <div class="brand-sub">Оптовый каталог<br>с оформлением заказа</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
      <a href="https://promotiondell-spec.github.io/perfume/" target="_blank" class="calc-btn">
        ➕💸
      </a>
      <button class="cart-btn" onclick="openCart()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Заказ <span class="cart-badge" id="cart-badge">0</span>
    </button>
    </div>
  </div>
  <div class="search-row">
    <input class="search-input" type="text" id="search" placeholder="Поиск по названию, нотам, описанию..." oninput="renderGrid()">
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Все</button>
    <button class="filter-btn" onclick="setFilter('fresh',this)">Свежие</button>
    <button class="filter-btn" onclick="setFilter('oriental',this)">Восточные</button>
    <button class="filter-btn" onclick="setFilter('woody',this)">Древесные</button>
    <button class="filter-btn" onclick="setFilter('floral',this)">Цветочные</button>
    <button class="filter-btn" onclick="setFilter('sweet',this)">Сладкие</button>
    <button class="filter-btn" onclick="setFilter('uni',this)">Унисекс</button>
    <button class="filter-btn" onclick="setFilter('m',this)">Мужские</button>
    <button class="filter-btn" onclick="setFilter('f',this)">Женские</button>
  </div>
</div>

<div class="list-header">
  <span class="count-label" id="count-label">64 аромата</span>
  <select class="sort-select" id="sort" onchange="renderGrid()">
    <option value="default">По умолчанию</option>
    <option value="name">По названию</option>
    <option value="price_asc">Цена ↑</option>
    <option value="price_desc">Цена ↓</option>
  </select>
</div>

<div class="grid" id="grid"></div>

<!-- DETAIL SHEET -->
<div class="overlay" id="detail-overlay" onclick="closeDetail()"></div>
<div class="sheet" id="detail-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-close"><button class="close-btn" onclick="closeDetail()">×</button></div>
  <div id="sheet-content"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightboxOnBg(event)">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <div class="lightbox-inner">
    <button class="lightbox-arrow prev" onclick="lbNav(-1)">‹</button>
    <div class="lightbox-slides" id="lb-slides"></div>
    <button class="lightbox-arrow next" onclick="lbNav(1)">›</button>
    <div class="lightbox-dots" id="lb-dots"></div>
  </div>
</div>

<!-- CART -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-head">
    <span class="cart-title">Ваш заказ</span>
    <button class="cart-x" onclick="closeCart()">×</button>
  </div>
  <div class="cart-body" id="cart-body"></div>
  <div class="cart-foot">
    <div class="cart-total-row"><span>Итого:</span><span id="cart-total">0 ₽</span></div>
    <button class="send-tg" onclick="sendOrder('tg')">Отправить заказ в Telegram</button>

g"}, {"id": 24, "origId": 24, "name": "Ambroxane", "similar": "Molecule 02", "simHouse": "Escentric Molecules", "type": "uni", "char": "fresh", "group": "восточные", "season": "", "occasion": "восточные", "badge": null, "status": "in_stock", "desc": "Escentric Molecules Molecule 02 — парфюм-невидимка на основе единственной молекулы амброксана. Этот аромат не существует в привычном смысле — он создаётся заново на каждом человеке, реагируя на pH кожи. Кто-то ощущает его почти морским и чистым, кто-то — тёплым и немного животным. Берлинский дом Escentric Molecules, основанный Гезой Шёном, изменил правила: один ингредиент — один парфюм.\n\nЭтот аромат чаще ищут: Escentric Molecules Molecule 02, молекула 02 амброксан, Escentric 02 отзывы, молекулярный парфюм унисекс, единственная молекула парфюм Этот аромат чаще ищут: Molecule 02 Escentric Molecules Молекула 02 эскентрик молекулс molecule 02, Амброксан Амброкзан.", "notes": {"top": ["Амброксан"], "heart": ["Амброксан"], "base": ["Амброксан", "Мускус"]}, "vols": [10, 30, 50], "matte": [], "photo": "photos/24notes.jpg", "simPhoto": "photos/24original.jpg", "ourglassPhoto": "photos/24ourglass.jpg"}, {"id": 25, "origId": 25, "name": "Nomad Smoke", "similar": "Gypsy Water", "simHouse": "Byredo", "type": "uni", "char": "fresh", "group": "древесные фужерные", "season": "", "occasion": "древесные фужерные", "badge": null, "status": "in_stock", "desc": "Byredo Gypsy Water — аромат вечных странников и ночных костров. Шведский дом Byredo, основанный Беном Горхэмом в 2006 году, создал в нём романтику цыганской свободы: можжевельник, перец и лимон открывают его по-лесному свежо, а ладан и корень ириса придают средней части медитативную глубину. Сандал и амбра в основании — тёплые, уютные, как угасающий огонь. Культовый нишевый хит.\n\nЭтот аромат чаще ищут: Byredo Gypsy Water, Бирэдо Джипси Уотер, Byredo цыганская вода, нишевый древесный унисекс byredo, gypsy water отзывы Этот аромат чаще ищут: Gypsy Water Byredo Джипси Вотер Байредо function getPhotos(p){

function bottleSVG(color){
  return `<svg width="34" height="66" viewBox="0 0 34 66" fill="none">
    <rect x="12" y="1" width="10" height="8" rx="2" fill="${color}" opacity=".55"/>
    <rect x="11" y="8" width="12" height="4" rx="1.5" fill="${color}" opacity=".4"/>
    <rect x="5" y="12" width="24" height="52" rx="7" fill="${color}" opacity=".13"/>
    <rect x="5" y="12" width="24" height="52" rx="7" stroke="${color}" stroke-width="1.5"/>
    <rect x="9" y="17" width="6" height="36" rx="3" fill="${color}" opacity=".1"/>
  </svg>`;
}

// ── SWIPE HELPER ──────────────────────────────────────
function addSwipe(el, onLeft, onRight){
  let startX=0, startY=0, moved=false;
  el.addEventListener('touchstart', e=>{
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    moved=false;
  },{passive:true});
  el.addEventListener('touchmove', e=>{
    moved=true;
  },{passive:true});
  el.addEventListener('touchend', e=>{
    if(!moved) return;
    const dx=e.changedTouches[0].clientX - startX;
    const dy=e.changedTouches[0].clientY - startY;
    if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40){
      if(dx < 0) onLeft();
      else onRight();
    }
  },{passive:true});
}

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const sort=document.getElementById('sort').value;
  let items=CATALOG.filter(p=>{
    const matchQ=!q||p.name.toLowerCase().includes(q)||p.similar.toLowerCase().includes(q)||
      p.desc.toLowerCase().includes(q)||
      [...p.notes.top,...p.notes.heart,...p.notes.base].some(note=>note.toLowerCase().includes(q));
    const matchF=activeFilter==='all'||p.char===activeFilter||p.type===activeFilter;
    return matchQ&&matchF;
  });
  if(sort==='name') items.sort((a,b)=>a.name.localeCompare(b.name,'ru'));
  document.getElementById('count-label').textContent=`${items.length} ароматов`;
  document.getElementById('grid').innerHTML=items.length
    ?items.map(cardHTML).join('')
    :'<div class="no-results">Ничего не найдено</div>';

  // Attach swipe to each card slider
  items.forEach(p=>{
    const sliderEl=document.getElementById(`cs-${p.id}`);
    if(sliderEl){
      addSwipe(sliderEl,
        ()=>cardSlide(p.id, 1),   // swipe left → next
        ()=>cardSlide(p.id, -1)   // swipe right → prev
      );
    }
  });
}

function cardHTML(p){
  const vol=selVols[p.id]||p.vols[0];
  const buy=CFG.prices[vol].buy;
  const retail=CFG.prices[vol].retail;
  const key=`${p.id}-${vol}`;
  const qty=cart[key]?cart[key].qty:0;
  const bg=charBg[p.char]||'#f5f5f3';
  const clr=charClr[p.char]||'#888';
  const badge=p.badge==='new'?`<span class="card-badge badge-new">Новинка</span>`:
               p.badge==='hit'?`<span class="card-badge badge-hit">Хит</span>`:'';
  const statusBadge=p.status==='on_order'?`<span class="card-badge badge-order">Под заказ</span>`:'';
  const topNotes=p.notes.top.slice(0,2).join(' · ');
  const photos=getPhotos(p);
  const curSlide=cardSlides[p.id]||0;

  const slides=photos.map((ph,i)=>`
    <div class="card-slide">
      <img src="${ph}" alt="" style="display:block"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
        >
      <div class="bottle-fallback" style="display:none;background:${bg}">${i===0?bottleSVG(clr):''}</div>
    </div>`).join('');

  const dots=photos.map((_,i)=>`<div class="card-dot${i===curSlide?' active':''}" ></div>`).join('');
  const translateX = curSlide * (100/photos.length);

  return `<div class="card" onclick="openDetail(${p.id})">
    <div class="card-slider" id="cs-${p.id}">
      ${badge}${statusBadge}
      <div class="card-slides" id="csl-${p.id}" style="transform:translateX(-${translateX}%)">
        ${slides}
      </div>
      <button class="card-arrow prev" onclick="event.stopPropagation();cardSlide(${p.id},-1)">‹</button>
      <button class="card-arrow next" onclick="event.stopPropagation();cardSlide(${p.id},1)">›</button>
      <div class="card-dots">${dots}</div>
    </div>
    <div class="card-body">
      <div class="card-type">${typeLabel[p.type]||'Унисекс'}</div>
      <div class="card-name">${p.name}</div>
      <div class="card-sim">≈ ${p.similar}</div>
      <div class="card-notes"><span class="note-tag">${topNotes||'—'}</span></div>
      <div class="card-vols">
        ${p.vols.map(v=>`<button class="vol-pill ${v===vol?'active':''}" onclick="event.stopPropagation();setCardVol(${p.id},${v})">${v} мл</button>`).join('')}
      </div>
      <div class="card-bottom">
        <div><div class="card-price">${n(buy)} ₽</div><div class="card-retail">РРЦ ${n(retail)} ₽</div></div>
        <div class="card-qty" onclick="event.stopPropagation()">
          ${qty>0?`<button class="card-qty-btn" onclick="cardQtyAdj(${p.id},${vol},-1)">−</button>
          <div class="card-qty-val">${qty}</div>`:''}
          <button class="card-qty-btn ${qty>0?'has-items':''}" onclick="cardQtyAdj(${p.id},${vol},1)">+</button>
        </div>
      </div>
    </div>
  </div>`;
}

function cardSlide(id, dir){
  const p = CATALOG.find(x=>x.id===id);
  if(!p) return;
  const photos = getPhotos(p);
  const cur = cardSlides[id]||0;
  // Infinite loop
  const next = (cur + dir + photos.length) % photos.length;
  cardSlides[id] = next;
  const slidesEl = document.getElementById(`csl-${id}`);
  if(slidesEl){
    const pct = next * (100/photos.length);
    slidesEl.style.transform = `translateX(-${pct}%)`;
  }
  // Update dots only
  const cardEl = document.querySelector(`#cs-${id}`)?.closest('.card');
  if(cardEl){
    cardEl.querySelectorAll('.card-dot').forEach((d,i)=>d.classList.toggle('active',i===next));
  }
}

function cardQtyAdj(id,vol,delta){
  const key=`${id}-${vol}`;
  const p=CATALOG.find(x=>x.id===id);
  if(!p) return;
  if(cart[key]){
    cart[key].qty=Math.max(0,cart[key].qty+delta);
    if(cart[key].qty===0) delete cart[key];
  } else if(delta>0){
    cart[key]={id,vol,name:p.name,buy:CFG.prices[vol].buy,qty:1};
  }
  saveCart();updateCartUI();renderGrid();
}

function setCardVol(id,vol){selVols[id]=vol;renderGrid();}

// DETAIL
function openDetail(id){
  openId=id;
  const p=CATALOG.find(x=>x.id===id);
  if(!p) return;
  detailVol=selVols[id]||p.vols[0];
  detailQty=1;
  renderSheet(p);
  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('detail-sheet').classList.add('open');
}
function closeDetail(){
  document.getElementById('detail-overlay').classList.remove('open');
  document.getElementById('detail-sheet').classList.remove('open');
  openId=null;
}

        <button class="qty-btn" onclick="adjDetailQty(1)">+</button>
      </div>
      <button class="add-main ${inCart?'done':''}" id="add-main-btn" onclick="addFromDetail(${p.id})">
        ${inCart?'Добавлено ✓':'Добавить в заказ'}
      </button>
    </div>
    </div><!-- /d-desktop-right -->
    </div><!-- /d-desktop -->`;

  // Attach swipe to detail gallery
  setTimeout(()=>{
    const dg=document.getElementById('d-gallery');
    if(dg){
      addSwipe(dg,
        ()=>detailGalleryNav(1),
        ()=>detailGalleryNav(-1)
      );
    }
  }, 50);
}

function detailGalleryNav(dir){
  const p=CATALOG.find(x=>x.id===openId);
  if(!p) return;
  const photos=getPhotos(p);
  detailSlide=(detailSlide+dir+photos.length)%photos.length;
  detailGalleryGo(detailSlide);
}
function detailGalleryGo(idx){
  const p=CATALOG.find(x=>x.id===openId);
  if(!p) return;
  detailSlide=idx;
  const sl=document.getElementById('d-gallery-slides');
  if(sl) sl.style.transform=`translateX(-${idx*100}%)`;
  document.querySelectorAll('.d-gallery-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}

// LIGHTBOX
let lbSlide=0, lbPhotos=[];
function openLightbox(id){
  const p=CATALOG.find(x=>x.id===id);
  if(!p) return;
  lbPhotos=getPhotos(p);
  lbSlide=detailSlide;
  const slidesEl=document.getElementById('lb-slides');
  slidesEl.style.width=(lbPhotos.length*100)+'%';
  slidesEl.innerHTML=lbPhotos.map(ph=>`
    <div style="width:${100/lbPhotos.length}%;flex-shrink:0">
      <img src="${ph}" style="width:100%;max-height:80dvh;object-fit:contain;border-radius:4px" alt="">
    </div>`).join('');
  const dotsEl=document.getElementById('lb-dots');
  dotsEl.innerHTML=lbPhotos.map((_,i)=>`<div class="lightbox-dot${i===lbSlide?' active':''}" onclick="lbGo(${i})"></div>`).join('');
  lbGo(lbSlide);
  document.getElementById('lightbox').classList.add('open');
  // Attach swipe to lightbox
  const lbInner=document.getElementById('lb-slides');
  if(lbInner && !lbInner._swipeAttached){
    lbInner._swipeAttached=true;
    addSwipe(lbInner,
      ()=>lbNav(1),
      ()=>lbNav(-1)
    );
  }
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
function closeLightboxOnBg(e){if(e.target===document.getElementById('lightbox'))closeLightbox();}
function lbNav(dir){lbGo((lbSlide+dir+lbPhotos.length)%lbPhotos.length);}
function lbGo(idx){
  lbSlide=idx;
  const sl=document.getElementById('lb-slides');
  if(sl) sl.style.transform=`translateX(-${idx*(100/lbPhotos.length)}%)`;
  document.querySelectorAll('.lightbox-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}

function setDetailVol(id,vol){detailVol=vol;selVols[id]=vol;const p=CATALOG.find(x=>x.id===id);if(p)renderSheet(p);}
function adjDetailQty(d){detailQty=Math.max(1,detailQty+d);const el=document.getElementById('detail-qty');if(el)el.textContent=detailQty;}
function addFromDetail(id){
  addToCart(id,detailVol,detailQty);
  const btn=document.getElementById('add-main-btn');
  if(btn){btn.textContent='Добавлено ✓';btn.classList.add('done');}
  renderGrid();
}

function addToCart(id,vol,qty){
  const key=`${id}-${vol}`;
  const p=CATALOG.find(x=>x.id===id);
  if(!p) return;
  if(cart[key]) cart[key].qty+=qty;
  else cart[key]={id,vol,name:p.name,buy:CFG.prices[vol].buy,qty};
  saveCart();updateCartUI();
}
function changeCartQty(key,delta){
  if(!cart[key]) return;
  cart[key].qty=Math.max(1,cart[key].qty+delta);
  saveCart();updateCartUI();renderGrid();
  if(openId){const p=CATALOG.find(x=>x.id===openId);if(p)renderSheet(p);}
}
function removeFromCart(key){
  delete cart[key];saveCart();updateCartUI();renderGrid();
  if(openId){const p=CATALOG.find(x=>x.id===openId);if(p)renderSheet(p);}
}
function updateCartUI(){
  const keys=Object.keys(cart);
  const total=keys.reduce((s,k)=>s+cart[k].buy*cart[k].qty,0);
  const totalQty=keys.reduce((s,k)=>s+cart[k].qty,0);
  document.getElementById('cart-badge').textContent=totalQty;
  document.getElementById('cart-total').textContent=n(total)+' ₽';
  document.getElementById('cart-body').innerHTML=keys.length
    ?keys.map(k=>`<div class="ci">
        <div class="ci-info"><div class="ci-name">${cart[k].name}</div><div class="ci-sub">${cart[k].vol} мл · ${n(cart[k].buy)} ₽/шт</div></div>
        <div class="ci-qty">
          <button class="ci-qty-btn" onclick="changeCartQty('${k}',-1)">−</button>
          <div class="ci-qty-val">${cart[k].qty}</div>
          <button class="ci-qty-btn" onclick="changeCartQty('${k}',1)">+</button>
        </div>
        <button class="ci-del" onclick="removeFromCart('${k}')">×</button>
      </div>`).join('')
    :'<div class="cart-empty">Корзина пуста</div>';
}

function openCart(){document.getElementById('cart-overlay').classList.add('open');document.getElementById('cart-drawer').classList.add('open');}
function closeCart(){document.getElementById('cart-overlay').classList.remove('open');document.getElementById('cart-drawer').classList.remove('open');}

function sendOrder(type){
  const keys=Object.keys(cart);
  if(!keys.length){alert('Добавьте позиции в заказ');return;}
  const total=keys.reduce((s,k)=>s+cart[k].buy*cart[k].qty,0);
  const lines=keys.map(k=>`- ${cart[k].name} ${cart[k].vol}мл × ${cart[k].qty} шт = ${n(cart[k].buy*cart[k].qty)} ₽`).join('\n');
  const msg=`Добрый день! Хочу оформить оптовый заказ.\n\nСостав заказа:\n${lines}\n\nИтого: ${n(total)} ₽\n\nЖду подтверждения!`;
  const isMobile=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if(type==='tg'){
    if(isMobile) window.location.href=`tg://resolve?domain=dell_daria&text=${encodeURIComponent(msg)}`;
    else window.open(`https://t.me/dell_daria?text=${encodeURIComponent(msg)}`,'_blank');
  } else {
    window.open(`mailto:${CFG.email}?subject=${encodeURIComponent('Оптовый заказ AT PARFUM')}&body=${encodeURIComponent(msg)}`);
  }
}

loadCart();updateCartUI();renderGrid();
</script>
</body>
</html>
