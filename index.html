<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Каталог — AT PARFUM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  color-scheme:light;
  --cream:#F7F4EF;
  --ink:#1C1A17;
  --ink2:#6B6760;
  --ink3:#A8A49E;
  --gold:#B8935A;
  --gold-light:#F0E4CE;
  --border:#E2DDD6;
  --card:#FFFFFF;
  --green:#1D9E75;
  --green-bg:#E1F5EE;
  --green-text:#085041;
  /* character colors */
  --fresh-bg:#E8F5F3;   --fresh:#2E7D72;
  --oriental-bg:#F5EDE8; --oriental:#8B4A3A;
  --woody-bg:#F0EDE0;   --woody:#6B5C3A;
  --floral-bg:#F5EAF0;  --floral:#8B5A7E;
  --sweet-bg:#EEE8F5;   --sweet:#6B5A8B;
}
html,body{background:#ffffff!important;color:var(--ink)!important}
body{font-family:'Helvetica Neue',Arial,sans-serif;min-height:100dvh;padding-bottom:80px}

/* ── HEADER ── */
.header{background:var(--ink);padding:16px 16px 12px;position:sticky;top:0;z-index:50}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.brand{display:flex;align-items:center}
.brand img{height:28px;width:auto;filter:brightness(0) invert(1)}
.cart-btn{display:flex;align-items:center;gap:6px;background:var(--gold);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Helvetica Neue',Arial,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.cart-badge{background:#fff;color:var(--ink);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.search-row{margin-bottom:10px}
.search-input{width:100%;padding:9px 14px;border:1px solid rgba(255,255,255,0.15);border-radius:8px;background:rgba(255,255,255,0.08);color:#fff;font-size:14px;font-family:'Helvetica Neue',Arial,sans-serif;outline:none}
.search-input::placeholder{color:rgba(255,255,255,0.4)}
.search-input:focus{border-color:var(--gold)}
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-btn{white-space:nowrap;padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.65);font-size:12px;cursor:pointer;font-family:'Helvetica Neue',Arial,sans-serif;transition:all .15s;flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.filter-btn.active{background:var(--gold);border-color:var(--gold);color:#fff}

/* ── LIST HEADER ── */
.list-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 8px}
.count-label{font-size:13px;color:var(--ink2)}
.sort-select{font-size:13px;border:1px solid var(--border);border-radius:6px;padding:5px 10px;background:#fff;color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;cursor:pointer;outline:none}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 12px 20px}
@media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:800px){.grid{grid-template-columns:repeat(4,1fr)}}

/* ── CARD ── */
.card{background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:transform .18s,box-shadow .18s}
.card:active{transform:scale(.98)}
.card-visual{height:110px;display:flex;align-items:center;justify-content:center;position:relative}
.card-badge{position:absolute;top:7px;left:7px;font-size:10px;font-weight:500;padding:3px 7px;border-radius:10px;letter-spacing:.03em}
.badge-new{background:var(--ink);color:#fff}
.badge-hit{background:var(--gold);color:#fff}
.card-body{padding:10px 11px 12px}
.card-type{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:2px}
.card-name{font-family:'Helvetica Neue',Arial,sans-serif;font-size:16px;font-weight:400;line-height:1.2;margin-bottom:4px}
.card-sim{font-size:11px;color:var(--ink2);font-style:italic;margin-bottom:7px}
.card-notes{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.note-tag{font-size:10px;padding:2px 6px;border-radius:8px;border:1px solid var(--border);color:var(--ink2)}
.card-vols{display:flex;gap:4px;margin-bottom:8px}
.vol-pill{flex:1;padding:4px 2px;font-size:11px;font-weight:500;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--ink2);cursor:pointer;text-align:center;transition:all .12s;font-family:'Helvetica Neue',Arial,sans-serif;touch-action:manipulation}
.vol-pill.active{border-color:var(--ink);background:var(--ink);color:#fff}
.card-bottom{display:flex;align-items:center;justify-content:space-between}
.card-price{font-size:15px;font-weight:500}
.card-retail{font-size:10px;color:var(--ink3);margin-top:1px}
.add-btn{width:30px;height:30px;border-radius:50%;background:var(--ink);color:#fff;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;touch-action:manipulation}
.add-btn:active{background:var(--gold)}
.add-btn.in-cart{background:var(--green)}

/* ── DETAIL MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:20px 20px 0 0;z-index:101;max-height:92dvh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0}
.sheet-close{position:sticky;top:0;display:flex;justify-content:flex-end;padding:8px 14px 0;background:#fff;z-index:2}
.close-btn{background:#f5f5f3;border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:18px;color:var(--ink2);display:flex;align-items:center;justify-content:center;touch-action:manipulation}

/* detail hero */
.d-hero{padding:0 16px 16px;display:flex;gap:14px}
.d-bottle{width:88px;height:108px;border-radius:12px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.d-info{flex:1;padding-top:2px}
.d-type{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:3px}
.d-name{font-family:'Helvetica Neue',Arial,sans-serif;font-size:22px;font-weight:400;line-height:1.15;margin-bottom:5px}
.d-sim{font-size:12px;color:var(--ink2);font-style:italic;margin-bottom:8px}
.d-tags{display:flex;flex-wrap:wrap;gap:4px}
.d-tag{font-size:11px;padding:3px 8px;border-radius:10px;border:1px solid var(--border);color:var(--ink2)}

/* sections */
.d-section{padding:14px 16px;border-top:1px solid var(--border)}
.d-section-title{font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.d-desc{font-size:14px;color:var(--ink2);line-height:1.7}

/* pyramid */
.pyramid{display:flex;flex-direction:column;gap:6px}
.pyr-row{display:flex;align-items:center;gap:10px}
.pyr-lbl{width:58px;font-size:11px;color:var(--ink3);text-align:right;flex-shrink:0}
.pyr-bar{flex:1;border-radius:8px;padding:8px 10px;display:flex;flex-wrap:wrap;gap:5px}
.pyr-bar.top{background:#E8F5F3}
.pyr-bar.heart{background:#F5EAF0}
.pyr-bar.base{background:#F0EDE0}
.pnote{font-size:12px;font-weight:500}
.pnote.top{color:#2E7D72}
.pnote.heart{color:#8B5A7E}
.pnote.base{color:#6B5C3A}

/* similar */
.sim-row{display:flex;gap:12px;align-items:center}
.sim-img{width:60px;height:60px;border-radius:10px;background:#f5f5f3;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:var(--ink3);text-align:center;line-height:1.4;padding:4px}
.sim-text{}
.sim-name{font-family:'Helvetica Neue',Arial,sans-serif;font-size:16px;margin-bottom:3px}
.sim-house{font-size:12px;color:var(--ink2)}

/* volumes */
.d-vols{display:flex;gap:8px}
.d-vol{flex:1;border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s;touch-action:manipulation}
.d-vol.active{border-color:var(--ink);background:#f5f5f3}
.d-vol .dv-ml{font-size:13px;font-weight:500;margin-bottom:3px}
.d-vol .dv-buy{font-size:16px;font-weight:500}
.d-vol .dv-ret{font-size:11px;color:var(--ink3);margin-top:2px}
.d-vol .dv-mat{font-size:10px;color:var(--gold);margin-top:2px}

/* add row */
.d-add{padding:14px 16px 28px;display:flex;gap:8px}
.qty-wrap{display:flex;align-items:center;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.qty-btn{width:40px;height:46px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink);touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.qty-val{width:38px;text-align:center;font-size:15px;font-weight:500}
.add-main{flex:1;height:46px;background:var(--ink);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Helvetica Neue',Arial,sans-serif;transition:background .15s;touch-action:manipulation}
.add-main.done{background:var(--green)}

/* ── CART DRAWER ── */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.cart-overlay.open{opacity:1;pointer-events:all}
.cart-drawer{position:fixed;right:0;top:0;bottom:0;width:320px;max-width:94vw;background:#fff;z-index:201;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.cart-drawer.open{transform:translateX(0)}
.cart-head{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cart-title{font-family:'Helvetica Neue',Arial,sans-serif;font-size:20px;font-weight:400}
.cart-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink2);line-height:1;touch-action:manipulation}
.cart-body{flex:1;overflow-y:auto;padding:12px 16px}
.cart-empty{text-align:center;padding:48px 0;color:var(--ink3);font-size:14px}
.ci{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);align-items:center}
.ci:last-child{border-bottom:none}
.ci-qty{display:flex;align-items:center;gap:0;flex-shrink:0}
.ci-qty-btn{width:28px;height:28px;border:1px solid var(--border);background:#f5f5f3;color:var(--ink);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent;line-height:1}
.ci-qty-btn:first-child{border-radius:6px 0 0 6px}
.ci-qty-btn:last-child{border-radius:0 6px 6px 0}
.ci-qty-val{width:30px;height:28px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;background:#fff}
.ci-info{flex:1}
.ci-name{font-size:14px;font-weight:500;margin-bottom:3px}
.ci-sub{font-size:12px;color:var(--ink2)}
.ci-del{background:none;border:none;color:var(--ink3);font-size:18px;cursor:pointer;padding:0 4px;touch-action:manipulation}
.cart-foot{padding:14px 16px 24px;border-top:1px solid var(--border)}
.cart-total-row{display:flex;justify-content:space-between;font-size:15px;font-weight:500;margin-bottom:12px}
.send-tg{width:100%;padding:13px;background:var(--ink);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Helvetica Neue',Arial,sans-serif;margin-bottom:8px;touch-action:manipulation}
.send-mail{width:100%;padding:13px;background:#f5f5f3;color:var(--ink);border:1px solid var(--border);border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Helvetica Neue',Arial,sans-serif;touch-action:manipulation}

.no-results{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--ink2);font-size:14px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="brand"><img src="logo.png" alt="AT PARFUM"></div>
    <button class="cart-btn" onclick="openCart()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Заказ <span class="cart-badge" id="cart-badge">0</span>
    </button>
  </div>
  <div class="search-row">
    <input class="search-input" type="text" id="search" placeholder="Поиск по названию, нотам..." oninput="renderGrid()">
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Все</button>
    <button class="filter-btn" onclick="setFilter('fresh',this)">Свежие</button>
    <button class="filter-btn" onclick="setFilter('oriental',this)">Восточные</button>
    <button class="filter-btn" onclick="setFilter('woody',this)">Древесные</button>
    <button class="filter-btn" onclick="setFilter('floral',this)">Цветочные</button>
    <button class="filter-btn" onclick="setFilter('sweet',this)">Сладкие</button>
    <button class="filter-btn" onclick="setFilter('uni',this)">Унисекс</button>
    <button class="filter-btn" onclick="setFilter('m',this)">Мужские</button>
    <button class="filter-btn" onclick="setFilter('f',this)">Женские</button>
  </div>
</div>

<div class="list-header">
  <span class="count-label" id="count-label">50 ароматов</span>
  <select class="sort-select" id="sort" onchange="renderGrid()">
    <option value="default">По умолчанию</option>
    <option value="margin">По марже ↓</option>
    <option value="name">По названию</option>
    <option value="price_asc">Цена ↑</option>
    <option value="price_desc">Цена ↓</option>
  </select>
</div>

<div class="grid" id="grid"></div>

<!-- DETAIL SHEET -->
<div class="overlay" id="detail-overlay" onclick="closeDetail()"></div>
<div class="sheet" id="detail-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-close"><button class="close-btn" onclick="closeDetail()">×</button></div>
  <div id="sheet-content"></div>
</div>

<!-- CART DRAWER -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-head">
    <span class="cart-title">Ваш заказ</span>
    <button class="cart-x" onclick="closeCart()">×</button>
  </div>
  <div class="cart-body" id="cart-body"></div>
  <div class="cart-foot">
    <div class="cart-total-row"><span>Итого:</span><span id="cart-total">0 ₽</span></div>
    <button class="send-tg" onclick="sendOrder('tg')">Отправить заказ в Telegram</button>
    <button class="send-mail" onclick="sendOrder('mail')">Отправить на почту</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════
   КОНФИГ — замените своими данными
   ══════════════════════════════════════════════════════ */
const CFG = {
  tgLink: 'https://t.me/dell_daria',
  email:  'team.voyage.paris@gmail.com',
  /* Цены — заменить реальными */
  prices: {
    10: { buy: 590,  retail: 1490 },
    30: { buy: 990,  retail: 2990 },
    50: { buy: 1490, retail: 4990 },
  },
  /* Какие объёмы доступны у каждого аромата — переопределяется в данных */
  defaultVols: [30, 50],
};

/* ══════════════════════════════════════════════════════
   ДАННЫЕ — 50 заглушек. Замените реальными ароматами.

   Поля:
   id        — уникальный номер
   name      — название аромата
   type      — uni / m / f
   char      — fresh / oriental / woody / floral / sweet
   season    — строка, например "Всесезон"
   occasion  — строка, например "Вечерний"
   similar   — название оригинала
   simHouse  — дом / бренд оригинала
   desc      — описание аромата (2-3 предложения)
   notes     — { top: [], heart: [], base: [] }
   vols      — доступные объёмы, например [30, 50] или [10, 30, 50]
   matte     — объёмы в матовом флаконе, например [50] или []
   badge     — 'new' / 'hit' / null
   ══════════════════════════════════════════════════════ */
const CATALOG = [
  {id:1,name:'Lumière Dorée',type:'uni',char:'fresh',season:'Всесезон',occasion:'Вечерний',similar:'Baccarat Rouge 540',simHouse:'Maison Francis Kurkdjian',desc:'Утончённый аромат с открытием из свежего бергамота. В сердце — роскошный жасмин и роза. База из тёплого мускуса и кедра создаёт долгий чувственный шлейф.',notes:{top:['Бергамот','Лимон','Грейпфрут'],heart:['Жасмин','Роза','Ирис'],base:['Мускус','Кедр','Амбра']},vols:[30,50],matte:[50],badge:'hit'},
  {id:2,name:'Nuit Profonde',type:'m',char:'oriental',season:'Осень/зима',occasion:'Вечерний',similar:'Oud Wood',simHouse:'Tom Ford',desc:'Глубокий восточный аромат на основе уда и кардамона. Сердце из розы и шафрана придаёт теплоту и сложность. Долговечная база из амбры и сандала.',notes:{top:['Кардамон','Шафран','Перец'],heart:['Уд','Роза','Ладан'],base:['Амбра','Сандал','Мускус']},vols:[30,50],matte:[50],badge:null},
  {id:3,name:'Bois Mystique',type:'uni',char:'woody',season:'Всесезон',occasion:'Офисный',similar:'Terre d\'Hermès',simHouse:'Hermès',desc:'Свежий древесный аромат с нотами грейпфрута и перца. Сердце из ветивера и пачули. Тёплая землистая база с оттенком дуба.',notes:{top:['Грейпфрут','Перец','Апельсин'],heart:['Ветивер','Пачули','Кедр'],base:['Дуб','Мох','Мускус']},vols:[30,50],matte:[],badge:'new'},
  {id:4,name:'Rose Éternelle',type:'f',char:'floral',season:'Весна',occasion:'Повседневный',similar:'Miss Dior',simHouse:'Dior',desc:'Романтический цветочный аромат с альдегидными верхними нотами. Пышный букет из ириса, фиалки и нероли. Нежная база из сандала и мускуса.',notes:{top:['Альдегиды','Нероли','Грейпфрут'],heart:['Ирис','Фиалка','Роза'],base:['Сандал','Мускус','Пудра']},vols:[30,50],matte:[50],badge:null},
  {id:5,name:'Ambre Précieux',type:'f',char:'sweet',season:'Зима',occasion:'Вечерний',similar:'La Vie Est Belle',simHouse:'Lancôme',desc:'Сладкий гурманский аромат с нотами карамели и ванили. Сердце из пралине и розы — уютное и соблазнительное. Глубокая база из бензоина и амбры.',notes:{top:['Ваниль','Карамель','Малина'],heart:['Пралине','Роза','Ирис'],base:['Бензоин','Амбра','Мускус']},vols:[30,50],matte:[50],badge:'hit'},

  {id:49,name:'Laurier Vert',type:'uni',char:'fresh',season:'Весна',occasion:'Офисный',similar:'Eau de Campagne',simHouse:'Sisley',desc:'Зелёный ароматный аромат с лавровым листом. Гербасное сердце. Землистая база.',notes:{top:['Лавровый лист','Шалфей','Базилик'],heart:['Тимьян','Лаванда','Розмарин'],base:['Мускус','Земля','Кедр']},vols:[30,50],matte:[],badge:null},
  {id:50,name:'Miel Ambré',type:'f',char:'sweet',season:'Осень/зима',occasion:'Уютный',similar:'L\'Heure Bleue',simHouse:'Guerlain',desc:'Медово-янтарный аромат с флоральными нотами. Ирисово-розовое сердце. Глубокая ванильная база.',notes:{top:['Мёд','Бергамот','Анис'],heart:['Ирис','Роза','Гелиотроп'],base:['Ваниль','Амбра','Бензоин']},vols:[30,50],matte:[50],badge:'hit'},
];

/* ══════════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════════ */
let activeFilter = 'all';
let cart = {}; // key: `id-vol`, value: {id, vol, name, buy, qty}
let selVols = {}; // selected vol per card: {id: vol}
let detailVol = 30;
let detailQty = 1;
let openId = null;

const n = v => Math.round(v).toLocaleString('ru-RU');

/* ══════════════════════════════════════════════════════
   CHAR HELPERS
   ══════════════════════════════════════════════════════ */
const charBg   = {fresh:'#E8F5F3',oriental:'#F5EDE8',woody:'#F0EDE0',floral:'#F5EAF0',sweet:'#EEE8F5'};
const charClr  = {fresh:'#2E7D72',oriental:'#8B4A3A',woody:'#6B5C3A',floral:'#8B5A7E',sweet:'#6B5A8B'};
const typeLabel= {uni:'Унисекс',m:'Мужской',f:'Женский'};

function bottleSVG(color, w=34, h=66){
  return `<svg width="${w}" height="${h}" viewBox="0 0 34 66" fill="none">
    <rect x="12" y="1" width="10" height="8" rx="2" fill="${color}" opacity=".55"/>
    <rect x="11" y="8" width="12" height="4" rx="1.5" fill="${color}" opacity=".4"/>
    <rect x="5" y="12" width="24" height="52" rx="7" fill="${color}" opacity=".13"/>
    <rect x="5" y="12" width="24" height="52" rx="7" stroke="${color}" stroke-width="1.5"/>
    <rect x="9" y="17" width="6" height="36" rx="3" fill="${color}" opacity=".1"/>
  </svg>`;
}

/* ══════════════════════════════════════════════════════
   GRID RENDER
   ══════════════════════════════════════════════════════ */
function setFilter(f, btn){
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const sort = document.getElementById('sort').value;

  let items = CATALOG.filter(p => {
    const matchQ = !q ||
      p.name.toLowerCase().includes(q) ||
      p.similar.toLowerCase().includes(q) ||
      [...p.notes.top,...p.notes.heart,...p.notes.base].some(n=>n.toLowerCase().includes(q));
    const matchF = activeFilter==='all' || p.char===activeFilter || p.type===activeFilter;
    return matchQ && matchF;
  });

  if(sort==='margin')     items.sort((a,b)=>CFG.prices[50].buy - CFG.prices[30].buy);
  else if(sort==='name')  items.sort((a,b)=>a.name.localeCompare(b.name,'ru'));
  else if(sort==='price_asc') items.sort((a,b)=>CFG.prices[30].buy - CFG.prices[30].buy);
  else if(sort==='price_desc') items.sort((a,b)=>CFG.prices[50].buy - CFG.prices[30].buy);

  document.getElementById('count-label').textContent = `${items.length} ароматов`;
  document.getElementById('grid').innerHTML = items.length
    ? items.map(cardHTML).join('')
    : '<div class="no-results">Ничего не найдено</div>';
}

function cardHTML(p){
  const vol = selVols[p.id] || p.vols[0];
  const buy = CFG.prices[vol].buy;
  const retail = CFG.prices[vol].retail;
  const key = `${p.id}-${vol}`;
  const inCart = !!cart[key];
  const bg = charBg[p.char]||'#f5f5f3';
  const clr = charClr[p.char]||'#888';
  const badge = p.badge==='new'
    ? `<span class="card-badge badge-new">Новинка</span>`
    : p.badge==='hit'
    ? `<span class="card-badge badge-hit">Хит</span>` : '';
  const topNotes = p.notes.top.slice(0,2).join(' · ');

  return `<div class="card" onclick="openDetail(${p.id})">
    <div class="card-visual" style="background:${bg}">
      ${badge}
      ${bottleSVG(clr)}
    </div>
    <div class="card-body">
      <div class="card-type">${typeLabel[p.type]}</div>
      <div class="card-name">${p.name}</div>
      <div class="card-sim">≈ ${p.similar}</div>
      <div class="card-notes"><span class="note-tag">${topNotes}</span></div>
      <div class="card-vols">
        ${p.vols.map(v=>`<button class="vol-pill ${v===vol?'active':''}" onclick="event.stopPropagation();setCardVol(${p.id},${v})">${v} мл</button>`).join('')}
      </div>
      <div class="card-bottom">
        <div>
          <div class="card-price">${n(buy)} ₽</div>
          <div class="card-retail">РРЦ ${n(retail)} ₽</div>
        </div>
        <button class="add-btn ${inCart?'in-cart':''}" onclick="event.stopPropagation();quickAdd(${p.id})">
          ${inCart?'✓':'+'}
        </button>
      </div>
    </div>
  </div>`;
}

function setCardVol(id, vol){
  selVols[id] = vol;
  renderGrid();
}

function quickAdd(id){
  const vol = selVols[id] || CATALOG.find(p=>p.id===id).vols[0];
  addToCart(id, vol, 1);
  renderGrid();
}

/* ══════════════════════════════════════════════════════
   DETAIL SHEET
   ══════════════════════════════════════════════════════ */
function openDetail(id){
  openId = id;
  const p = CATALOG.find(x=>x.id===id);
  detailVol = selVols[id] || p.vols[0];
  detailQty = 1;
  renderSheet(p);
  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('detail-sheet').classList.add('open');
}

function closeDetail(){
  document.getElementById('detail-overlay').classList.remove('open');
  document.getElementById('detail-sheet').classList.remove('open');
  openId = null;
}

function renderSheet(p){
  const clr = charClr[p.char]||'#888';
  const bg  = charBg[p.char]||'#f5f5f3';
  const buy = CFG.prices[detailVol].buy;
  const retail = CFG.prices[detailVol].retail;
  const key = `${p.id}-${detailVol}`;
  const inCart = !!cart[key];

  document.getElementById('sheet-content').innerHTML = `
    <div class="d-hero">
      <div class="d-bottle" style="background:${bg}">${bottleSVG(clr,42,80)}</div>
      <div class="d-info">
        <div class="d-type">${typeLabel[p.type]} · ${p.season}</div>
        <div class="d-name">${p.name}</div>
        <div class="d-sim">≈ ${p.similar}</div>
        <div class="d-tags">
          <span class="d-tag">${p.occasion}</span>
          <span class="d-tag">${p.char==='fresh'?'Свежий':p.char==='oriental'?'Восточный':p.char==='woody'?'Древесный':p.char==='floral'?'Цветочный':'Сладкий'}</span>
          ${p.matte.length?`<span class="d-tag" style="color:var(--gold);border-color:var(--gold)">Есть матовый</span>`:''}
        </div>
      </div>
    </div>

    <div class="d-section">
      <div class="d-section-title">Описание</div>
      <div class="d-desc">${p.desc}</div>
    </div>

    <div class="d-section">
      <div class="d-section-title">Пирамида нот</div>
      <div class="pyramid">
        <div class="pyr-row">
          <div class="pyr-lbl">Верхние</div>
          <div class="pyr-bar top">${p.notes.top.map(n=>`<span class="pnote top">${n}</span>`).join('')}</div>
        </div>
        <div class="pyr-row">
          <div class="pyr-lbl">Сердце</div>
          <div class="pyr-bar heart">${p.notes.heart.map(n=>`<span class="pnote heart">${n}</span>`).join('')}</div>
        </div>
        <div class="pyr-row">
          <div class="pyr-lbl">База</div>
          <div class="pyr-bar base">${p.notes.base.map(n=>`<span class="pnote base">${n}</span>`).join('')}</div>
        </div>
      </div>
    </div>

    <div class="d-section">
      <div class="d-section-title">Похож на</div>
      <div class="sim-row">
        <div class="sim-img">фото<br>оригинала</div>
        <div class="sim-text">
          <div class="sim-name">${p.similar}</div>
          <div class="sim-house">${p.simHouse}</div>
        </div>
      </div>
    </div>

    <div class="d-section">
      <div class="d-section-title">Объём и цена</div>
      <div class="d-vols">
        ${p.vols.map(v=>`<div class="d-vol ${v===detailVol?'active':''}" onclick="setDetailVol(${p.id},${v})">
          <div class="dv-ml">${v} мл</div>
          <div class="dv-buy">${n(CFG.prices[v].buy)} ₽</div>
          <div class="dv-ret">РРЦ ${n(CFG.prices[v].retail)} ₽</div>
          ${p.matte.includes(v)?`<div class="dv-mat">+ матовый</div>`:''}
        </div>`).join('')}
      </div>
    </div>

    <div class="d-add">
      <div class="qty-wrap">
        <button class="qty-btn" onclick="adjDetailQty(-1)">−</button>
        <div class="qty-val" id="detail-qty">${detailQty}</div>
        <button class="qty-btn" onclick="adjDetailQty(1)">+</button>
      </div>
      <button class="add-main ${inCart?'done':''}" id="add-main-btn" onclick="addFromDetail(${p.id})">
        ${inCart?'Добавлено ✓':'Добавить в заказ'}
      </button>
    </div>`;
}

function setDetailVol(id, vol){
  detailVol = vol;
  const p = CATALOG.find(x=>x.id===id);
  selVols[id] = vol;
  renderSheet(p);
}

function adjDetailQty(d){
  detailQty = Math.max(1, detailQty + d);
  const el = document.getElementById('detail-qty');
  if(el) el.textContent = detailQty;
}

function addFromDetail(id){
  addToCart(id, detailVol, detailQty);
  const btn = document.getElementById('add-main-btn');
  if(btn){btn.textContent='Добавлено ✓';btn.classList.add('done');}
  renderGrid();
}

/* ══════════════════════════════════════════════════════
   CART
   ══════════════════════════════════════════════════════ */
function addToCart(id, vol, qty){
  const key = `${id}-${vol}`;
  const p = CATALOG.find(x=>x.id===id);
  if(cart[key]) cart[key].qty += qty;
  else cart[key] = {id, vol, name:p.name, buy:CFG.prices[vol].buy, qty};
  updateCartUI();
}

function removeFromCart(key){
  delete cart[key];
  updateCartUI();
  renderGrid();
  if(openId){
    const p = CATALOG.find(x=>x.id===openId);
    if(p) renderSheet(p);
  }
}

function changeCartQty(key, delta){
  if(!cart[key]) return;
  cart[key].qty = Math.max(1, cart[key].qty + delta);
  updateCartUI();
  renderGrid();
  if(openId){ const p = CATALOG.find(x=>x.id===openId); if(p) renderSheet(p); }
}

function updateCartUI(){
  const keys = Object.keys(cart);
  const total = keys.reduce((s,k)=>s+cart[k].buy*cart[k].qty,0);
  const totalQty = keys.reduce((s,k)=>s+cart[k].qty,0);
  document.getElementById('cart-badge').textContent = totalQty;
  document.getElementById('cart-total').textContent = n(total)+' ₽';
  document.getElementById('cart-body').innerHTML = keys.length
    ? keys.map(k=>`<div class="ci">
        <div class="ci-info">
          <div class="ci-name">${cart[k].name}</div>
          <div class="ci-sub">${cart[k].vol} мл · ${n(cart[k].buy)} ₽/шт</div>
        </div>
        <div class="ci-qty">
          <button class="ci-qty-btn" onclick="changeCartQty('${k}',-1)">−</button>
          <div class="ci-qty-val">${cart[k].qty}</div>
          <button class="ci-qty-btn" onclick="changeCartQty('${k}',1)">+</button>
        </div>
        <button class="ci-del" onclick="removeFromCart('${k}')">×</button>
      </div>`).join('')
    : '<div class="cart-empty">Корзина пуста</div>';
}

function openCart(){
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-drawer').classList.add('open');
}
function closeCart(){
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-drawer').classList.remove('open');
}

function sendOrder(type){
  const keys = Object.keys(cart);
  if(!keys.length){alert('Добавьте позиции в заказ');return;}
  const total = keys.reduce((s,k)=>s+cart[k].buy*cart[k].qty,0);
  const lines = keys.map(k=>`- ${cart[k].name} ${cart[k].vol}мл × ${cart[k].qty} шт = ${n(cart[k].buy*cart[k].qty)} ₽`).join('\n');
  const msg = `Добрый день! Хочу оформить оптовый заказ.\n\nСостав заказа:\n${lines}\n\nИтого: ${n(total)} ₽\n\nЖду подтверждения!`;
  if(type==='tg'){
    const tgUrl = `tg://resolve?domain=dell_daria&text=${encodeURIComponent(msg)}`;
    window.location.href = tgUrl;
  } else {
    window.open(`mailto:${CFG.email}?subject=${encodeURIComponent('Оптовый заказ AT PARFUM')}&body=${encodeURIComponent(msg)}`);
  }
}

/* ══════════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════════ */
updateCartUI();
renderGrid();
</script>
</body>
</html>
